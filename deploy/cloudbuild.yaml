steps:
# 1. Analysis Run Image
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-analysis-run:latest
  - --dockerfile=deploy/containers/Dockerfile.analysis.run
  - --context=dir:///workspace
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-'] # Start immediately

# 2. Reporting API Image
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-report-api:latest
  - --dockerfile=deploy/containers/Dockerfile.report.api
  - --context=dir:///workspace
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

# 3. Reporting UI Image
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-report-ui:latest
  - --dockerfile=/workspace/deploy/containers/Dockerfile.report.ui
  - --context=dir:///workspace/services/report_service/ui
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

# 4. WFE Image
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-analysis-wfe:latest
  - --dockerfile=deploy/containers/Dockerfile.analysis.wfe
  - --context=dir:///workspace
  - --build-arg=PROJECT_ID=${PROJECT_ID}
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

# 5. Poller Image
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-analysis-poller:latest
  - --dockerfile=deploy/containers/Dockerfile.analysis.poller
  - --context=dir:///workspace
  - --build-arg=PROJECT_ID=${PROJECT_ID}
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

# 6. Analysis DB Migrations
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-analysis-dbmigration:latest
  - --dockerfile=deploy/containers/Dockerfile.analysis.dbmigrations
  - --context=dir:///workspace
  - --build-arg=PROJECT_ID=${PROJECT_ID}
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

# 7. Report DB Migrations
- name: 'gcr.io/kaniko-project/executor:latest'
  args:
  - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/sp-report-dbmigration:latest
  - --dockerfile=deploy/containers/Dockerfile.report.dbmigrations
  - --context=dir:///workspace
  - --build-arg=PROJECT_ID=${PROJECT_ID}
  - --build-arg=ARTIFACT_REGISTRY_URL=${_ARTIFACT_REGISTRY_URL}
  - --cache=true
  - --cache-ttl=24h
  waitFor: ['-']

options:
  machineType: 'E2_HIGHCPU_32'
  logging: CLOUD_LOGGING_ONLY
